<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصف الثانى الثانوى علمى العام 2ا 2026</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body{
            margin:0;
            font-family:Tahoma, 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== الشعار ===== */
        .logo{
            position:fixed;
            top:50px;
            left:50px;
            z-index:999;
        }

        .logo img{
            width:110px;
            height:auto;
        }

        /* ===== الصفحة ===== */
        .app{
            max-width:900px;
            margin:auto;
            padding:15px;
        }

        .header{
            background:linear-gradient(135deg,#2c3e50,#4b6cb7);
            color:#fff;
            padding:20px;
            border-radius:15px;
            text-align:center;
            margin-top:70px;
        }

        /* ===== البحث ===== */
        .search-box{
            display:flex;
            gap:10px;
            margin-top:15px;
        }

        input{
            flex:1;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size: 1rem;
        }

        button{
            padding:12px 18px;
            border:none;
            border-radius:10px;
            background:#4b6cb7;
            color:#fff;
            cursor:pointer;
            font-family: Tahoma;
            font-size: 1rem;
        }

        /* ===== الكارت ===== */
        .card{
            background:#fff;
            margin-top:20px;
            padding:20px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        /* ===== العنوان ===== */
        .title{
            text-align:center;
            font-size:18px;
            font-weight:bold;
            margin-bottom:15px;
        }

        /* ===== الجدول ===== */
        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ccc;
            padding:10px;
            text-align:center;
        }

        th{
            background:#4b6cb7;
            color:#fff;
        }

        /* ===== أزرار ===== */
        .actions{
            margin-top:15px;
        }

        .actions button{
            width:100%;
            background:#27ae60;
        }

        /* ===== زر العودة - ثابت في الأعلى ===== */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #e94560;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* ===== الطباعة ===== */
        @media print{
            body{
                background:#fff;
            }

            .logo{
                display:none;
            }

            body::before{
                content:"";
                position:fixed;
                top:50%;
                left:50%;
                transform:translate(-50%,-50%);
                width:400px;
                height:400px;
                background:url("logo.png") no-repeat center;
                background-size:contain;
                opacity:0.07;
                z-index:0;
            }

            .card{
                position:relative;
                z-index:2;
            }

            .search-box{
                display:none;
            }

            button{
                display:none;
            }

            .back-btn {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- الشعار -->
    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <!-- ✅ زر العودة ثابت في الأعلى -->
    <a href="index.html" class="back-btn">🔙 الرئيسية</a>

    <div class="app">

        <div class="header">
            📊 مدرسة الشهيد احمد عبد النبى عطوة الاعدادية الثانوية بنات - 2025 / 2026
            <br>
            📚 الصف الثانى الثانوى علمى - نظام نتائج الطلاب
        </div>

        <div class="search-box">
            <input id="searchInput" placeholder="ابحث بالاسم أو الكود">
            <button onclick="search()">بحث</button>
        </div>

        <div id="result"></div>

    </div>

    <script>

        let students2 = [];
        let isLoaded = false;

        /* =========================
           تحميل البيانات (كاش ذكي)
        ========================= */
        async function loadData(){

            const cache = localStorage.getItem("students2");
            const cacheTime = localStorage.getItem("students2_time");

            const now = Date.now();

            if(cache && cacheTime && (now - cacheTime < 300000)){
                students2 = JSON.parse(cache);
                isLoaded = true;
                return;
            }

            const res = await fetch("students2.json?t=" + now, {
                cache: "no-store"
            });

            students2 = await res.json();

            localStorage.setItem("students2", JSON.stringify(students2));
            localStorage.setItem("students2_time", now);

            isLoaded = true;
        }

        /* =========================
           البحث
        ========================= */
        function search(){

            if(!isLoaded){
                document.getElementById("result").innerHTML =
                "<div class='card'>⏳ جاري تحميل البيانات...</div>";
                return;
            }

            const q = document.getElementById("searchInput").value.trim();

            const student = students2.find(s =>
                Object.values(s).some(v => String(v).includes(q))
            );

            if(!student){
                document.getElementById("result").innerHTML =
                "<div class='card'>❌ لا توجد بيانات مطابقة</div>";
                return;
            }

            render(student);
        }

        /* =========================
           عرض الجدول فقط
        ========================= */
        function render(s){

            let html = `
            <div class="card">

                <div class="title">📄  درجات الطالب بالصف الثانى الثانوى علمى  للعام 2025 - 2026</div>

                <table>
                    <tr>
                        <th>الحقل</th>
                        <th>القيمة</th>
                    </tr>

                    ${buildTable(s)}
                </table>

                <div class="actions">
                    <button onclick="window.print()">🖨 طباعة / PDF</button>
                </div>

            </div>`;

            document.getElementById("result").innerHTML = html;
        }

        /* =========================
           تحويل JSON إلى جدول
        ========================= */
        function buildTable(s){

            let rows = "";

            for(let key in s){

                let value = s[key];

                if(typeof value === "object") continue;

                rows += `
                <tr>
                    <td>${key}</td>
                    <td>${value}</td>
                </tr>`;
            }

            return rows;
        }

        /* ========================= */
        window.onload = loadData;

    </script>

</body>
</html>
